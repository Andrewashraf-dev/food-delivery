version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fresco_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fresco_db
      POSTGRES_USER: fresco_user
      POSTGRES_PASSWORD: fresco_pg_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fresco_user -d fresco_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fresco_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fresco_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fresco_db
      DB_USER: fresco_user
      DB_PASSWORD: fresco_pg_password
      JWT_SECRET: change_this_to_a_long_random_string_in_production
      JWT_EXPIRE: 30d
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fresco_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fresco_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fresco_network

volumes:
  pg_data:

networks:
  fresco_network:
    driver: bridge
